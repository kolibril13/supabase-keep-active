name: Supabase keepalive

# Pings the "flat expenses" Supabase project (fumnlubgimbcwkozgpel) so it
# doesn't get auto-paused after 7 days of inactivity.
#
# Trigger fires every hour (168 slots/week), but each run only actually
# pings Supabase with ~3% probability (~5 real pings/week on average), so
# the real request lands at a different, unpredictable hour each time
# instead of a handful of fixed slots. A hard floor forces a real ping if
# 5 days have passed since the last one, so bad RNG luck can never let it
# slide past the 7-day pause window.
#
# Each real ping commits an updated .github/last-ping state file, which
# doubles as repo activity — keeping GitHub from auto-disabling this
# scheduled workflow after 60 days of repo inactivity.

on:
  schedule:
    - cron: "0 * * * *" # every hour, on the hour (actual runs are usually a few minutes late)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decide whether this run should actually ping
        id: decide
        run: |
          state_file=".github/last-ping"
          now_ts=$(date +%s)
          if [ -f "$state_file" ]; then
            last_ts=$(date -d "$(cat "$state_file")" +%s)
          else
            last_ts=0
          fi
          days_since=$(( (now_ts - last_ts) / 86400 ))

          # ~5 real pings per week out of 168 hourly slots: 5/168 ~= 0.0298
          roll=$((RANDOM % 32768))
          should_ping=false
          if [ "$roll" -lt 975 ] || [ "$days_since" -ge 5 ]; then
            should_ping=true
          fi

          echo "days_since_last_ping=$days_since roll=$roll/32768 should_ping=$should_ping"
          echo "should_ping=$should_ping" >> "$GITHUB_OUTPUT"

      - name: Ping Supabase project
        if: steps.decide.outputs.should_ping == 'true'
        run: |
          status=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://fumnlubgimbcwkozgpel.supabase.co/rest/v1/expenses?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "Supabase responded with HTTP $status"
          if [ "$status" -ge 400 ]; then
            echo "::warning::Supabase ping returned HTTP $status"
          fi
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Record ping (also serves as repo-activity heartbeat)
        if: steps.decide.outputs.should_ping == 'true'
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-ping
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last-ping
          git commit -m "chore: keepalive ping $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
