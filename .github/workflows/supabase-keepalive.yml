name: Supabase keepalive

# Pings the "flat expenses" Supabase project (fumnlubgimbcwkozgpel) a few
# times a week so it doesn't get auto-paused after 7 days of inactivity.
# Also nudges this repo if it's gone quiet for a while, since GitHub
# auto-disables scheduled workflows after 60 days with no repo activity.

on:
  schedule:
    - cron: "17 3 * * 1"  # Mon 03:17 UTC
    - cron: "52 14 * * 3" # Wed 14:52 UTC
    - cron: "38 9 * * 5"  # Fri 09:38 UTC
    - cron: "5 21 * * 0"  # Sun 21:05 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping Supabase project
        run: |
          status=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://fumnlubgimbcwkozgpel.supabase.co/rest/v1/expenses?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "Supabase responded with HTTP $status"
          if [ "$status" -ge 400 ]; then
            echo "::warning::Supabase ping returned HTTP $status"
          fi
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Heartbeat commit if repo has been quiet 50+ days
        run: |
          last_commit_ts=$(git log -1 --format=%ct)
          now_ts=$(date +%s)
          days_since=$(( (now_ts - last_commit_ts) / 86400 ))
          echo "Days since last repo commit: $days_since"
          if [ "$days_since" -ge 50 ]; then
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive-heartbeat
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/keepalive-heartbeat
            git commit -m "chore: keepalive heartbeat (repo inactive ${days_since}d)"
            git push
          else
            echo "Repo recently active, no heartbeat needed."
          fi
